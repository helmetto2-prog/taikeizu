body{background:#f4f7f4;color:#1a1a1a;padding:12px;}

.wrap{grid-template-columns:1fr;gap:0;}

.board{min-height:auto;border:none;padding:4px;}

}
h1{font-size:20px;color:var(--gd);margin-bottom:2px;}
.sub{font-size:12px;color:#666;margin-bottom:10px;}
.wrap{display:grid;grid-template-columns:1fr 330px;gap:12px;align-items:start;}

.zl-shita{background:var(--g);}
.zl-both{background:var(--org);}

#z-moto{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
/* 下請け：2段（7列） */
#z-shita{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}

#z-shizai,#z-both{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.center-row{display:flex;align-items:center;justify-content:space-between;gap:20px;margin:16px 0;padding:0 8px;}
.side-col{display:flex;flex-direction:column;justify-content:flex-start;gap:6px;flex:0 0 auto;width:270px;}

display:flex;align-items:center;justify-content:center;gap:6px;}

.midori span{font-size:12px;opacity:.9;letter-spacing:2px;}
.chip{border:1.5px solid;border-radius:9px;padding:5px 6px;cursor:pointer;background:#fff;

.chip:hover{transform:translateY(-2px);box-shadow:0 3px 8px rgba(0,0,0,.15);}
.chip b{display:block;font-size:11px;line-height:1.25;}
.chip small{color:#666;font-size:9px;display:block;line-height:1.2;margin-top:1px;}
.c-moto{border-color:var(--blue);background:var(--bluel);}
.c-moto b{color:var(--blue);}
.c-shita{border-color:var(--g);background:var(--gl);}
.c-shita b{color:var(--gd);}
.c-both{border-color:var(--org);background:var(--orgl);}
.c-both b{color:var(--org);}
.c-shizai{border-color:var(--pur);background:var(--purl);}
.c-shizai b{color:var(--pur);}
.chip.active{outline:3px solid #ffca28;}
.arrow{text-align:center;color:#9e9e9e;font-size:11px;margin:2px;}
.panel{background:#fff;border:1px solid #ddd;border-radius:12px;padding:16px;position:sticky;top:12px;}
.panel h2{font-size:16px;margin-bottom:2px;}
.badge{font-size:11px;color:#fff;padding:2px 10px;border-radius:12px;display:inline-block;margin-bottom:10px;}
.b-moto{background:var(--blue);}
.b-shita{background:var(--g);}
.b-both{background:var(--org);}
.b-shizai{background:var(--pur);}

.big{font-size:20px;color:var(--gd);font-weight:bold;}
.hint{color:#999;font-size:12px;line-height:1.6;}
.legend{font-size:11px;color:#555;margin-top:10px;display:flex;gap:12px;flex-wrap:wrap;}
.legend span{display:inline-flex;align-items:center;gap:4px;}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
.tag{font-size:10px;background:#fce4ec;color:#c2185b;padding:1px 6px;border-radius:8px;margin-left:4px;}
