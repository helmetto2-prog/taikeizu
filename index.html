body{background:#f4f7f4;color:#1a1a1a;padding:10px 10px 80px;}

.chip.active{outline:3px solid #ffca28;}
.arrow{text-align:center;color:#9e9e9e;font-size:11px;margin:8px 0 0;}
.midori{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-radius:16px;

.legend{font-size:11px;color:#555;margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

.dot{width:10px;height:10px;border-radius:3px;display:inline-block;}

.overlay.on{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:16px 16px 0 0;
box-shadow:0 -4px 20px rgba(0,0,0,.25);padding:14px 16px 24px;z-index:10;
max-height:70vh;overflow-y:auto;transform:translateY(105%);transition:.22s;}
.sheet.on{transform:translateY(0);}
.sheet h2{font-size:16px;margin-bottom:2px;padding-right:36px;}
.close{position:absolute;top:10px;right:12px;width:30px;height:30px;border-radius:50%;
border:none;background:#eee;color:#555;font-size:16px;font-weight:bold;cursor:pointer;}
.badge{font-size:11px;color:#fff;padding:2px 10px;border-radius:12px;display:inline-block;margin-bottom:8px;}
.b-moto{background:var(--blue);}

.row{display:flex;padding:6px 0;border-bottom:1px dashed #e0e0e0;font-size:13px;}
.row .k{width:78px;color:#777;flex-shrink:0;font-size:12px;}

const sheet=document.getElementById("sheet"),overlay=document.getElementById("overlay"),body=document.getElementById("sheetBody");

function closeSheet(){ sheet.classList.remove("on"); overlay.classList.remove("on");
document.querySelectorAll(".chip").forEach(function(c){c.classList.remove("active");}); }
document.getElementById("closeBtn").onclick=closeSheet;
overlay.onclick=closeSheet;
function chip(d){
const e=document.createElement("div");
e.className="chip "+catClass[d.cat];
e.innerHTML="<b>"+d.name+"</b><small>"+(d.sub||"")+"</small>";
e.onclick=function(){
document.querySelectorAll(".chip").forEach(function(c){c.classList.remove("active");});
e.classList.add("active");
let rows="<div class='row'><div class='k'>区分</div><div class='v'>"+catName[d.cat]+"</div></div>";
if(d.sub) rows+="<div class='row'><div class='k'>担当/備考</div><div class='v'>"+d.sub+"</div></div>";
if(d.memo) rows+="<div class='row' style='border:none'><div class='k'>メモ</div><div class='v' style='font-weight:400'>"+d.memo+"</div></div>";
openSheet("<h2>"+d.name+"</h2><span class='badge "+catBadge[d.cat]+"'>"+catName[d.cat]+"</span>"+rows);
};
return e;
}
